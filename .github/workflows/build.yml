name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core@8 @capacitor/android@8 @capacitor/cli@8 @capacitor/app@8

      - name: Build React app
        run: npm run build

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.testapp.app",
            "appName": "Test App",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Remove android if exists
        run: rm -rf android

      - name: Capacitor add android
        run: npx cap add android

      - name: Patch usesCleartextTraffic
        run: |
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: test-app
          path: android/app/build/outputs/apk/debug/app-debug.apk